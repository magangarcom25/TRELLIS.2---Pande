model:
  # Kita gunakan path resmi agar sistem download otomatis
  pretrained_model_name_or_path: "JeffreyJi/TRELLIS-image-to-3d" 

dataset:
  manifest_path: "datasets/ganesha_manifest.jsonl"
  batch_size: 1             
  num_workers: 2            

training:
  learning_rate: 5e-5       
  max_steps: 2000           
  save_every: 500           
  output_dir: "checkpoints/ganesha_results"
  mixed_precision: "fp16"